<!DOCTYPE html>
<html lang="it" data-page="gruppo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDF Obiettivi • Gruppo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f2e1c">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <main class="app-shell">
    <header class="simple-top">
      <a class="back-link" href="index.html">← Dashboard</a>
      <div class="simple-title-wrap">
        <div class="section-kicker lightish">Collaborazione</div>
        <h1 class="simple-title">Gruppo</h1>
      </div>
    </header>

    <section class="card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Obiettivo condiviso</div>
          <div class="section-title">450 pezzi di gruppo</div>
        </div>
        <div class="right-big" id="gruppoPercent">0%</div>
      </div>
      <div class="group-total" id="gruppoMain">0 / 450 pezzi</div>
      <div class="track">
        <div class="fill fill-blue" id="gruppoFill"></div>
      </div>
      <div class="group-grid">
        <div class="group-box">
          <div class="group-box-label">Mancano</div>
          <div class="group-box-value" id="gruppoMissing">0</div>
        </div>
        <div class="group-box">
          <div class="group-box-label">Previsione</div>
          <div class="group-box-value" id="gruppoForecast">0</div>
        </div>
        <div class="group-box">
          <div class="group-box-label">Serve</div>
          <div class="group-box-value"><span id="gruppoNeed">0</span>/giorno</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Team</div>
          <div class="section-title">Contributi individuali</div>
        </div>
      </div>
      <div id="teamContribution"></div>
    </section>

    <nav class="bottom-nav">
      <a class="nav-link" href="index.html">Obiettivi</a>
      <a class="nav-link" href="classifica.html">Classifica</a>
      <a class="nav-link" href="storico.html">Storico</a>
      <a class="nav-link" href="premi.html">Premi</a>
      <a class="nav-link active" href="gruppo.html">Gruppo</a>
      <a class="nav-link" href="profilo.html">Profilo</a>
      <a class="nav-link" href="impostazioni.html">Altro</a>
    </nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
