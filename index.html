<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obiettivi Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<div class="header">
  <h1>🎯 Obiettivi</h1>
</div>

<div class="card user" id="utente"></div>

<div class="card progress">
  <div class="big-number" id="progresso"></div>
  <div class="bar"><div id="barra"></div></div>
</div>

<div class="card stato" id="stato"></div>
<div class="card badge" id="badge"></div>

<div class="card extra" id="extra"></div>

<div class="card gruppo">
  <h3>👥 Squadra</h3>
  <div id="gruppo"></div>
  <div class="bar"><div id="barraGruppo"></div></div>
</div>

<div class="card classifica">
  <h3>🏆 Classifica</h3>
  <div id="classifica"></div>
</div>

<button onclick="logout()">Esci</button>

</div>

<script src="app.js"></script>
</body>
</html>
