<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDF Obiettivi • Login</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f2e1c">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="brand-row">
        <div class="brand-logo">LDF</div>
        <div>
          <div class="brand-name">Laboratorio della Farmacia</div>
          <div class="brand-sub">Area obiettivi collaboratori</div>
        </div>
      </div>

      <h1 class="login-title">Accedi</h1>
      <p class="login-copy">Dopo il primo accesso il profilo resta memorizzato sul telefono.</p>

      <label class="field-label" for="nome">Nome</label>
      <input class="field" id="nome" autocomplete="username" placeholder="Es. Vale">

      <label class="field-label" for="pin">PIN</label>
      <input class="field" id="pin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="PIN">

      <button class="primary-btn" id="loginBtn">Entra</button>
      <p class="error-text" id="loginError"></p>

      <div class="hint-panel">
        <div><strong>Profilo test</strong></div>
        <div>Nome: <strong>Vale</strong></div>
        <div>PIN: <strong>2859</strong></div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
