<!DOCTYPE html>
<html lang="it" data-page="storico">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDF Obiettivi • Storico</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f2e1c">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <main class="app-shell">
    <header class="simple-top">
      <a class="back-link" href="index.html">← Dashboard</a>
      <div class="simple-title-wrap">
        <div class="section-kicker lightish">Andamento</div>
        <h1 class="simple-title">Storico</h1>
      </div>
    </header>

    <section class="card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Le ultime settimane</div>
          <div class="section-title">Crescita personale</div>
        </div>
      </div>
      <canvas id="historyChart" height="220"></canvas>
    </section>

    <section class="metrics-grid">
      <article class="metric-card emerald">
        <div class="metric-label">Media settimanale</div>
        <div class="metric-value" id="weeklyAvg">0</div>
        <div class="metric-sub">pezzi</div>
      </article>
      <article class="metric-card blue">
        <div class="metric-label">Miglior settimana</div>
        <div class="metric-value" id="bestWeek">0</div>
        <div class="metric-sub">pezzi</div>
      </article>
      <article class="metric-card orange">
        <div class="metric-label">Trend</div>
        <div class="metric-value" id="trendValue">+</div>
        <div class="metric-sub" id="trendText">in crescita</div>
      </article>
    </section>

    <section class="card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Dettaglio</div>
          <div class="section-title">Riepilogo settimane</div>
        </div>
      </div>
      <div id="historyRows"></div>
    </section>

    <nav class="bottom-nav">
      <a class="nav-link" href="index.html">Obiettivi</a>
      <a class="nav-link" href="classifica.html">Classifica</a>
      <a class="nav-link active" href="storico.html">Storico</a>
      <a class="nav-link" href="premi.html">Premi</a>
      <a class="nav-link" href="gruppo.html">Gruppo</a>
      <a class="nav-link" href="profilo.html">Profilo</a>
      <a class="nav-link" href="impostazioni.html">Altro</a>
    </nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
