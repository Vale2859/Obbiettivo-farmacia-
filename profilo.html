<!DOCTYPE html>
<html lang="it" data-page="profilo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDF Obiettivi • Profilo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f2e1c">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <main class="app-shell">
    <header class="simple-top">
      <a class="back-link" href="index.html">← Dashboard</a>
      <div class="simple-title-wrap">
        <div class="section-kicker lightish">Area personale</div>
        <h1 class="simple-title">Profilo</h1>
      </div>
    </header>

    <section class="card profile-card">
      <div class="profile-head">
        <div class="profile-avatar large" id="profileInitials">V</div>
        <div>
          <div class="profile-name" id="profileName">Vale</div>
          <div class="profile-role">Collaboratore</div>
        </div>
      </div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-label">Pezzi</div>
          <div class="profile-stat-value" id="profilePieces">0</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-label">Posizione</div>
          <div class="profile-stat-value" id="profileRank">#1</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-label">Premio</div>
          <div class="profile-stat-value" id="profileReward">0€</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Riepilogo</div>
          <div class="section-title">I tuoi dati</div>
        </div>
      </div>
      <div class="list-row"><div>Stato attuale</div><strong id="profileStatus">-</strong></div>
      <div class="list-row"><div>Media al giorno</div><strong id="profileAvg">-</strong></div>
      <div class="list-row"><div>Previsione fine mese</div><strong id="profileForecast">-</strong></div>
      <div class="list-row"><div>Obiettivo minimo</div><strong>121</strong></div>
      <div class="list-row"><div>Obiettivo massimo</div><strong>150</strong></div>
    </section>

    <section class="card">
      <button class="danger-btn" id="logoutBtn">Esci dal profilo</button>
    </section>

    <nav class="bottom-nav">
      <a class="nav-link" href="index.html">Obiettivi</a>
      <a class="nav-link" href="classifica.html">Classifica</a>
      <a class="nav-link" href="storico.html">Storico</a>
      <a class="nav-link" href="premi.html">Premi</a>
      <a class="nav-link" href="gruppo.html">Gruppo</a>
      <a class="nav-link active" href="profilo.html">Profilo</a>
      <a class="nav-link" href="impostazioni.html">Altro</a>
    </nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
